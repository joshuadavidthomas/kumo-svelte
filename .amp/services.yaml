services:
  kumo-svelte-docs:
    command: >-
      export PATH="$HOME/.local/bin:$PATH" &&
      exec pnpm
      --filter @kumo-svelte/docs dev
      --host 0.0.0.0 --port "$PORT"
    portal:
      title: Kumo Svelte
      description: Current Svelte worktree for parity review.

  kumo-react-docs:
    command: >-
      export PATH="$HOME/.local/bin:$PATH" &&
      portal_host="$(node -e 'console.log(new URL(process.env.PUBLIC_URL).hostname)')" &&
      export __VITE_ADDITIONAL_SERVER_ALLOWED_HOSTS="$portal_host" &&
      export PATH="$PWD/.amp/bin:$PATH" &&
      exec pnpm --dir .amp/upstream/kumo
      --filter @cloudflare/kumo-docs-astro dev
      --host 0.0.0.0 --port "$PORT"
    portal:
      title: Kumo React
      description: Authoritative cloudflare/kumo main checkout for side-by-side parity review.
