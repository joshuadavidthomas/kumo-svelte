name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Check
        run: pnpm check

      - name: Check upstream inventory coverage
        run: pnpm upstream:coverage

      - name: Test
        run: pnpm test

      - name: Test packed package consumer
        run: pnpm test:packed-consumer

      - name: Build docs
        run: pnpm docs:build
